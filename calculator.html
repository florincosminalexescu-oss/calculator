<!DOCTYPE html>
<html>
<head>
    <title>Calculator Minimalist</title>
    <link rel="stylesheet" href="calculator.css">
</head>
<body>
    <div class="container">
        <div class="calculator">
            <input type="text" readonly placeholder="0" id="display" class="display">
            
            <div class="butoane">
                <button onclick="stergeCaracter();" class="btn btn-secondary">⌫</button>
                <button onclick="sterge();" class="btn btn-secondary">AC</button>
                <button class="btn btn-secondary">%</button>
                <button class="operatie btn btn-primary">/</button>

                <button class="numar btn">7</button>
                <button class="numar btn">8</button>
                <button class="numar btn">9</button>
                <button class="operatie btn btn-primary">*</button>

                <button class="numar btn">4</button>
                <button class="numar btn">5</button>
                <button class="numar btn">6</button>
                <button class="operatie btn btn-primary">-</button>

                <button class="numar btn">1</button>
                <button class="numar btn">2</button>
                <button class="numar btn">3</button>
                <button class="operatie btn btn-primary">+</button>

                <button class="operatie btn btn-primary">+/-</button>
                <button class="numar btn btn-zero">0</button>
                <button class="operatie btn btn-primary">.</button>
                <button onclick="calculeaza();" class="btn btn-success">=</button>
            </div>
        </div>
    </div>

    <script src="calculator.js"></script>
</body>
</html>
